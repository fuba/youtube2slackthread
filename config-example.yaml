# YouTube2Slack Configuration File

youtube:
  download_dir: "./downloads"        # Directory to save downloaded videos
  format: "best"                     # Video format (best, bestaudio, etc.)
  keep_video: true                   # Whether to keep video files after processing

whisper:
  model: "base"                      # Whisper model (tiny, base, small, medium, large)
  device: null                       # Device to use (cpu, cuda, or null for auto)
  language: null                     # Language code (en, ja, etc. or null for auto-detect)
  allowed_local_users:              # Slack User IDs allowed to use local Whisper
    # - "U1234567890"               # Example user ID (replace with actual user IDs)
    # - "U0987654321"               # Add more user IDs as needed
  # If allowed_local_users is empty or null, all users can use local Whisper
  # If specified, only listed users can use local Whisper (others must use OpenAI API)

# Transcriber engine: "whisper" (OpenAI Whisper) or "reazonspeech" (ReazonSpeech K2 + sherpa-onnx)
# "reazonspeech" is recommended for Japanese - faster, lower memory, no GPU required
transcriber_engine: "whisper"

reazonspeech:
  model_dir: "./models/sherpa-onnx-zipformer-ja-reazonspeech-2024-08-01"
  vad_model: "./models/silero_vad.onnx"
  num_threads: 2                   # CPU threads for inference
  use_int8: true                   # Use int8 quantized model (~154MB vs ~588MB)
  # Download models: bash scripts/download_reazonspeech_model.sh

slack:
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  channel: null                      # Optional channel override (e.g., "#transcripts")
  include_timestamps: false          # Include timestamps in transcription
  send_errors_to_slack: true         # Send error notifications to Slack